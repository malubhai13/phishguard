# .github/workflows/deploy.yml
# On every push to main:
#   1. Run tests
#   2. Build Docker image
#   3. Push to Docker Hub
#   4. SSH into AWS EC2 and pull + restart the new image

name: CI/CD — PhishGuard API

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Tests ────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest httpx

      - name: Train model (needed for tests)
        run: python model/train.py

      - name: Run tests
        run: pytest tests/ -v

  # ── Job 2: Build & Push Docker image ───────────────────────────────────────
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'   # only on main branch push

    steps:
      - uses: actions/checkout@v4

      - name: Train model
        run: python model/train.py

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/phishguard-api:latest
            ${{ secrets.DOCKER_USERNAME }}/phishguard-api:${{ github.sha }}

  # ── Job 3: Deploy to AWS EC2 ────────────────────────────────────────────────
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: SSH and deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ubuntu
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/phishguard
            docker compose pull phishguard-api
            docker compose up -d --no-deps phishguard-api
            docker image prune -f
            echo "✅ Deployed successfully"
